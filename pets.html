<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우유펫 관리자 — 반려동물관리</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pets.css">
</head>
<body>

<div class="layout">

  <!-- ========== 사이드바 ========== -->
  <aside class="sidebar">
    <div class="sidebar__logo-area">
      <img src="assets/images/logo.png" alt="우유펫 로고" class="sidebar__logo-img">
      <div class="sidebar__brand-ko">우유펫</div>
      <div class="sidebar__brand-en">WOOYOOPET</div>
    </div>
    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__menu-item">대시보드</a>
      <a href="members.html" class="sidebar__menu-item" data-perm="perm_members">회원관리</a>
      <a href="kindergartens.html" class="sidebar__menu-item" data-perm="perm_kindergartens">유치원관리</a>
      <a href="pets.html" class="sidebar__menu-item active" data-perm="perm_pets">반려동물관리</a>
      <a href="reservations.html" class="sidebar__menu-item" data-perm="perm_reservations">돌봄예약관리</a>
      <a href="payments.html" class="sidebar__menu-item" data-perm="perm_payments">결제관리</a>
      <a href="settlements.html" class="sidebar__menu-item" data-perm="perm_settlements">정산관리</a>
      <a href="chats.html" class="sidebar__menu-item" data-perm="perm_chats">채팅관리</a>
      <a href="reviews.html" class="sidebar__menu-item" data-perm="perm_reviews">후기관리</a>
      <a href="educations.html" class="sidebar__menu-item" data-perm="perm_educations">교육관리</a>
      <a href="contents.html" class="sidebar__menu-item" data-perm="perm_contents">콘텐츠관리</a>
      <a href="settings.html" class="sidebar__menu-item" data-perm="perm_settings">설정</a>
    </nav>
    <div class="sidebar__profile">
      <div class="sidebar__profile-row">
        <div class="sidebar__avatar">
          <svg class="sidebar__avatar-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </div>
        <div class="sidebar__profile-info">
          <span class="sidebar__admin-name">홍길동</span>
          <span class="sidebar__admin-role">관리자</span>
        </div>
      </div>
      <div class="sidebar__logout">로그아웃</div>
    </div>
  </aside>

  <!-- ========== 메인 콘텐츠 ========== -->
  <div class="main">

    <!-- 헤더 -->
    <header class="header">
      <h1 class="header__title">반려동물관리</h1>
      <div class="header__right">
        <span class="header__admin-name">홍길동 관리자</span>
        <span class="header__logout">로그아웃</span>
      </div>
    </header>

    <!-- 콘텐츠 영역 -->
    <div class="content">

      <!-- 필터 바 (3행) -->
      <div class="filter-bar">
        <!-- 1행: 기간 -->
        <div class="filter-row">
          <span class="filter-label">등록일</span>
          <input type="date" class="filter-input filter-input--date" value="2025-01-01">
          <span class="filter-separator">~</span>
          <input type="date" class="filter-input filter-input--date" value="2026-12-31">
        </div>
        <!-- 2행: 분류 -->
        <div class="filter-row">
          <span class="filter-label">필터</span>
          <select class="filter-select">
            <option>크기: 전체</option>
            <option>소형</option>
            <option>중형</option>
            <option>대형</option>
          </select>
        </div>
        <!-- 3행: 검색 -->
        <div class="filter-row">
          <span class="filter-label">검색</span>
          <select class="filter-select">
            <option>반려동물 이름</option>
            <option>견종</option>
          </select>
          <input type="text" class="filter-input filter-input--search" placeholder="검색어를 입력하세요">
          <button class="btn-search">검색</button>
        </div>
      </div>

      <!-- 결과 헤더 -->
      <div class="result-header">
        <span class="result-header__count">검색 결과 <strong id="resultCount">0</strong>건</span>
        <button class="btn-excel">
          <svg class="btn-excel__icon" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 12l-4-4h2.5V3h3v5H12L8 12zm-6 2h12v1.5H2V14z"/>
          </svg>
          내역 다운로드
        </button>
      </div>

      <!-- 데이터 테이블 -->
      <div class="data-table-wrap data-table-wrap--scroll">
        <table class="data-table">
          <thead>
            <tr>
              <th>번호</th>
              <th>반려동물 이름</th>
              <th>보호자 닉네임</th>
              <th>보호자 연락처</th>
              <th>이미지</th>
              <th>견종</th>
              <th>성별</th>
              <th>나이</th>
              <th>몸무게</th>
              <th>크기</th>
              <th>중성화</th>
              <th>예방접종</th>
              <th>대표</th>
              <th>돌봄 횟수</th>
              <th>등록일</th>
              <th>상세</th>
            </tr>
          </thead>
          <tbody id="petListBody">
            <tr><td colspan="16" style="text-align:center;padding:40px 0;color:var(--text-weak);">데이터를 불러오는 중입니다.</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 페이지네이션 -->
      <div class="pagination">
        <button class="pagination__btn pagination__btn--arrow" disabled>«</button>
        <button class="pagination__btn pagination__btn--arrow" disabled>‹</button>
        <button class="pagination__btn active">1</button>
        <button class="pagination__btn">2</button>
        <button class="pagination__btn">3</button>
        <button class="pagination__btn">4</button>
        <button class="pagination__btn">5</button>
        <button class="pagination__btn pagination__btn--arrow">›</button>
        <button class="pagination__btn pagination__btn--arrow">»</button>
      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /layout -->

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/common.js"></script>
<script src="js/components.js"></script>
<script src="js/api.js"></script>
<script src="js/pets.js"></script>
</body>
</html>
