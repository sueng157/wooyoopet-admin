<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우유펫 관리자 — 새 FAQ 등록</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/contents.css">
  <!-- Quill 에디터 -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar__logo-area">
      <img src="assets/images/logo.png" alt="우유펫 로고" class="sidebar__logo-img">
      <div class="sidebar__brand-ko">우유펫</div>
      <div class="sidebar__brand-en">WOOYOOPET</div>
    </div>
    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__menu-item">대시보드</a>
      <a href="members.html" class="sidebar__menu-item" data-perm="perm_members">회원관리</a>
      <a href="kindergartens.html" class="sidebar__menu-item" data-perm="perm_kindergartens">유치원관리</a>
      <a href="pets.html" class="sidebar__menu-item" data-perm="perm_pets">반려동물관리</a>
      <a href="reservations.html" class="sidebar__menu-item" data-perm="perm_reservations">돌봄예약관리</a>
      <a href="payments.html" class="sidebar__menu-item" data-perm="perm_payments">결제관리</a>
      <a href="settlements.html" class="sidebar__menu-item" data-perm="perm_settlements">정산관리</a>
      <a href="chats.html" class="sidebar__menu-item" data-perm="perm_chats">채팅관리</a>
      <a href="reviews.html" class="sidebar__menu-item" data-perm="perm_reviews">후기관리</a>
      <a href="educations.html" class="sidebar__menu-item" data-perm="perm_educations">교육관리</a>
      <a href="contents.html" class="sidebar__menu-item active" data-perm="perm_contents">콘텐츠관리</a>
      <a href="settings.html" class="sidebar__menu-item" data-perm="perm_settings">설정</a>
    </nav>
    <div class="sidebar__profile">
      <div class="sidebar__profile-row">
        <div class="sidebar__avatar"><svg class="sidebar__avatar-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div>
        <div class="sidebar__profile-info"><span class="sidebar__admin-name">홍길동</span><span class="sidebar__admin-role">관리자</span></div>
      </div>
      <div class="sidebar__logout">로그아웃</div>
    </div>
  </aside>

  <div class="main">
    <header class="header"><h1 class="header__title"><a href="contents.html" style="color:inherit;text-decoration:none;">콘텐츠관리</a> <span style="color:var(--text-weak);font-weight:400;font-size:16px;">› FAQ › 등록</span></h1><div class="header__right"><span class="header__admin-name">홍길동 관리자</span><span class="header__logout">로그아웃</span></div></header>

    <div class="content">

      <!-- 상단 액션바 -->
      <div class="detail-top">
        <a href="contents.html#tab-faq" class="btn-back">← FAQ 목록으로</a>
        <div class="detail-actions">
          <button class="btn-action btn-action--primary" data-modal-open="registerModal">등록</button>
        </div>
      </div>

      <div class="detail-card" id="detailFaqCreate">
        <div class="detail-card__header"><span class="detail-card__title">FAQ 정보</span></div>
        <div class="info-grid">
          <span class="info-grid__label">FAQ 고유번호</span>
          <span class="info-grid__value" style="color:var(--text-weak);">등록 시 자동 부여</span>

          <span class="info-grid__label">카테고리</span>
          <span class="info-grid__value">
            <select class="form-select" id="faqCategory">
              <option value="공통">공통</option>
            </select>
          </span>

          <span class="info-grid__label">질문</span>
          <span class="info-grid__value"><input type="text" class="form-input" id="faqQuestion" placeholder="질문을 입력하세요"></span>

          <span class="info-grid__label">답변</span>
          <span class="info-grid__value cnt-full-width">
            <div id="faqEditorContainer" style="height:300px;"></div>
          </span>

          <span class="info-grid__label">대상</span>
          <span class="info-grid__value">
            <select class="form-select" id="faqTarget">
              <option value="전체(공통)">전체(공통)</option>
              <option value="보호자">보호자</option>
              <option value="유치원">유치원</option>
            </select>
          </span>

          <span class="info-grid__label">노출 순서</span>
          <span class="info-grid__value">
            <input type="number" id="faqDisplayOrder" class="form-input form-input--short" style="background:var(--surface-base);color:var(--text-weak);" readonly>
            <br><small style="color:var(--text-weak);">선택된 표시 위치의 마지막 순서로 자동 지정됩니다. 상세화면에서 변경 가능합니다.</small>
          </span>

          <span class="info-grid__label">공개 상태</span>
          <span class="info-grid__value"><span class="badge badge--c-gray">비공개</span></span>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- 등록 확인 모달 -->
<div class="modal-overlay" id="registerModal">
  <div class="modal">
    <div class="modal__title" style="color:var(--primary);">FAQ 등록</div>
    <div class="modal__message">
      FAQ를 등록하시겠습니까?<br>
      비공개 상태로 저장되며, 이후 상세화면에서 공개 전환할 수 있습니다.
    </div>
    <div class="modal__actions">
      <button class="modal__btn modal__btn--cancel" data-modal-close>취소</button>
      <button class="modal__btn modal__btn--confirm-primary" id="btnFaqCreate">등록</button>
    </div>
  </div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/common.js"></script>
<script src="js/components.js"></script>
<script src="js/api.js"></script>
<script src="js/contents.js"></script>
</body>
</html>
