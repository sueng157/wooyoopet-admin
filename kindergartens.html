            <option>방학중</option>
          </select>
          <select class="filter-select" style="min-width:160px;">

            <option>미시작</option>
            <option>진행중</option>

        </div>

        <div class="filter-row">
          <span class="filter-label">검색</span>
          <select class="filter-select" style="min-width:140px;">
            <option>유치원명</option>
            <option>운영자 성명</option>
          </select>
          <input type="text" class="filter-input filter-input--search" placeholder="검색어를 입력하세요">
          <button class="btn-search">검색</button>
        </div>
      </div>
