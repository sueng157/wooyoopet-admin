<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우유펫 관리자 — 체크리스트 버전 상세</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/educations.css">
</head>
<body>

<div class="layout">

  <!-- ========== 사이드바 ========== -->
  <aside class="sidebar">
    <div class="sidebar__logo-area">
      <img src="assets/images/logo.png" alt="우유펫 로고" class="sidebar__logo-img">
      <div class="sidebar__brand-ko">우유펫</div>
      <div class="sidebar__brand-en">WOOYOOPET</div>
    </div>
    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__menu-item">대시보드</a>
      <a href="members.html" class="sidebar__menu-item" data-perm="perm_members">회원관리</a>
      <a href="kindergartens.html" class="sidebar__menu-item" data-perm="perm_kindergartens">유치원관리</a>
      <a href="pets.html" class="sidebar__menu-item" data-perm="perm_pets">반려동물관리</a>
      <a href="reservations.html" class="sidebar__menu-item" data-perm="perm_reservations">돌봄예약관리</a>
      <a href="payments.html" class="sidebar__menu-item" data-perm="perm_payments">결제관리</a>
      <a href="settlements.html" class="sidebar__menu-item" data-perm="perm_settlements">정산관리</a>
      <a href="chats.html" class="sidebar__menu-item" data-perm="perm_chats">채팅관리</a>
      <a href="reviews.html" class="sidebar__menu-item" data-perm="perm_reviews">후기관리</a>
      <a href="educations.html" class="sidebar__menu-item active" data-perm="perm_educations">교육관리</a>
      <a href="contents.html" class="sidebar__menu-item" data-perm="perm_contents">콘텐츠관리</a>
      <a href="settings.html" class="sidebar__menu-item" data-perm="perm_settings">설정</a>
    </nav>
    <div class="sidebar__profile">
      <div class="sidebar__profile-row">
        <div class="sidebar__avatar">
          <svg class="sidebar__avatar-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </div>
        <div class="sidebar__profile-info">
          <span class="sidebar__admin-name">홍길동</span>
          <span class="sidebar__admin-role">관리자</span>
        </div>
      </div>
      <div class="sidebar__logout">로그아웃</div>
    </div>
  </aside>

  <!-- ========== 메인 콘텐츠 ========== -->
  <div class="main">

    <header class="header">
      <h1 class="header__title"><a href="educations.html" style="color:inherit;text-decoration:none;">교육관리</a> <span style="color:var(--text-weak);font-weight:400;font-size:16px;">› 체크리스트 / 활동 서약서 › 상세</span></h1>
      <div class="header__right">
        <span class="header__admin-name">홍길동 관리자</span>
        <span class="header__logout">로그아웃</span>
      </div>
    </header>

    <div class="content">

      <!-- 상단 액션바 -->
      <div class="detail-top">
        <a href="educations.html" class="btn-back">← 체크리스트 / 활동 서약서 목록으로</a>
        <!-- 뷰 모드 버튼 -->
        <div class="detail-actions" id="viewModeActions">
          <button class="btn-action btn-action--outline" id="btnStatusChange">상태변경</button>
          <button class="btn-action btn-action--primary" id="btnEdit">수정</button>
          <button class="btn-action btn-action--danger" id="btnDelete">삭제</button>
        </div>
        <!-- 편집 모드 버튼 (숨김) -->
        <div class="detail-actions" id="editModeActions" style="display:none;">
          <button class="btn-action btn-action--outline" id="btnEditCancel">취소</button>
          <button class="btn-action btn-action--primary" id="btnEditSave">저장</button>
        </div>
      </div>

      <!-- ========== 버전 정보 ========== -->
      <div class="detail-card" id="detailCheckBasic">
        <div class="detail-card__header">
          <h2 class="detail-card__title">버전 정보</h2>
        </div>
        <!-- JS가 동적으로 렌더링 -->
      </div>

      <!-- ========== 체크리스트 항목 ========== -->
      <div class="detail-card" id="detailCheckItemsCard">
        <div class="detail-card__header">
          <h2 class="detail-card__title">체크리스트 항목</h2>
        </div>

        <table class="edu-items-table">
          <thead>
            <tr>
              <th>순서</th>
              <th>항목 내용</th>
              <th style="width:80px;text-align:center;">사용</th>
              <th class="edit-only-col" style="display:none;">삭제</th>
            </tr>
          </thead>
          <tbody id="detailCheckItems">
            <!-- JS가 동적으로 렌더링 -->
          </tbody>
        </table>

        <!-- 항목 추가 (편집 모드에서만 표시) -->
        <div class="edu-add-row" id="addRowArea" style="display:none;">
          <button class="edu-add-row__btn">+ 항목 추가</button>
        </div>

      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /layout -->

<!-- ========== 상태변경 확인 모달 ========== -->
<div class="modal-overlay" id="statusChangeModal">
  <div class="modal">
    <div class="modal__title" style="color:var(--primary);">적용 상태 변경</div>
    <div class="modal__message" id="statusChangeMessage">
      <!-- JS에서 동적 메시지 -->
    </div>
    <div class="modal__actions">
      <button class="modal__btn modal__btn--cancel" data-modal-close>취소</button>
      <button class="modal__btn modal__btn--confirm-primary" id="btnStatusChangeConfirm">변경</button>
    </div>
  </div>
</div>

<!-- ========== 삭제 확인 모달 ========== -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal__title" style="color:var(--danger);">체크리스트 삭제</div>
    <div class="modal__message" id="deleteMessage">
      <!-- JS에서 동적 메시지 -->
    </div>
    <div class="modal__actions">
      <button class="modal__btn modal__btn--cancel" data-modal-close>취소</button>
      <button class="modal__btn" style="background:var(--danger);color:#fff;border:none;" id="btnDeleteConfirm">삭제</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/common.js"></script>
<script src="js/components.js"></script>
<script src="js/api.js"></script>
<script src="js/educations.js"></script>
</body>
</html>
