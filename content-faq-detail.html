<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우유펫 관리자 — FAQ 상세</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/contents.css">
  <!-- Quill 에디터 (편집 모드에서 사용) -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar__logo-area">
      <img src="assets/images/logo.png" alt="우유펫 로고" class="sidebar__logo-img">
      <div class="sidebar__brand-ko">우유펫</div>
      <div class="sidebar__brand-en">WOOYOOPET</div>
    </div>
    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__menu-item">대시보드</a>
      <a href="members.html" class="sidebar__menu-item" data-perm="perm_members">회원관리</a>
      <a href="kindergartens.html" class="sidebar__menu-item" data-perm="perm_kindergartens">유치원관리</a>
      <a href="pets.html" class="sidebar__menu-item" data-perm="perm_pets">반려동물관리</a>
      <a href="reservations.html" class="sidebar__menu-item" data-perm="perm_reservations">돌봄예약관리</a>
      <a href="payments.html" class="sidebar__menu-item" data-perm="perm_payments">결제관리</a>
      <a href="settlements.html" class="sidebar__menu-item" data-perm="perm_settlements">정산관리</a>
      <a href="chats.html" class="sidebar__menu-item" data-perm="perm_chats">채팅관리</a>
      <a href="reviews.html" class="sidebar__menu-item" data-perm="perm_reviews">후기관리</a>
      <a href="educations.html" class="sidebar__menu-item" data-perm="perm_educations">교육관리</a>
      <a href="contents.html" class="sidebar__menu-item active" data-perm="perm_contents">콘텐츠관리</a>
      <a href="settings.html" class="sidebar__menu-item" data-perm="perm_settings">설정</a>
    </nav>
    <div class="sidebar__profile">
      <div class="sidebar__profile-row">
        <div class="sidebar__avatar"><svg class="sidebar__avatar-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div>
        <div class="sidebar__profile-info"><span class="sidebar__admin-name">홍길동</span><span class="sidebar__admin-role">관리자</span></div>
      </div>
      <div class="sidebar__logout">로그아웃</div>
    </div>
  </aside>

  <div class="main">
    <header class="header"><h1 class="header__title"><a href="contents.html" style="color:inherit;text-decoration:none;">콘텐츠관리</a> <span style="color:var(--text-weak);font-weight:400;font-size:16px;">› FAQ › 상세</span></h1><div class="header__right"><span class="header__admin-name">홍길동 관리자</span><span class="header__logout">로그아웃</span></div></header>

    <div class="content">

      <!-- 상단 액션바 -->
      <div class="detail-top">
        <a href="contents.html#tab-faq" class="btn-back">← FAQ 목록으로</a>
        <!-- 보기 모드 버튼 -->
        <div class="detail-actions" id="detailViewActions">
          <button class="btn-action btn-action--outline-warning" id="btnToggleVisibility">비공개 전환</button>
          <button class="btn-action btn-action--primary" id="btnEditMode">수정</button>
          <button class="btn-action btn-action--outline-danger" id="btnDeleteOpen">삭제</button>
        </div>
        <!-- 편집 모드 버튼 -->
        <div class="detail-actions" id="detailEditActions" style="display:none;">
          <button class="btn-action btn-action--outline-gray" id="btnEditCancel">취소</button>
          <button class="btn-action btn-action--primary" id="btnEditSave">저장</button>
        </div>
      </div>

      <div class="detail-card" id="detailFaqBasic">
        <div class="detail-card__header"><span class="detail-card__title">FAQ 정보</span></div>
        <!-- 보기 모드: JS가 채움 -->
        <div class="info-grid" id="viewFaqBasic">
        </div>
        <!-- 편집 모드 (초기 숨김): JS가 채움 -->
        <div class="info-grid" id="editFaqBasic" style="display:none;">
        </div>
      </div>

    </div>
  </div>
</div>

<!-- 저장 확인 모달 -->
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <div class="modal__title">FAQ 수정</div>
    <div class="modal__message">수정사항을 저장하시겠습니까?</div>
    <div class="modal__actions">
      <button class="modal__btn modal__btn--cancel" data-modal-close>취소</button>
      <button class="modal__btn modal__btn--confirm-primary" id="btnSaveConfirm">저장</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal__title">FAQ 삭제</div>
    <div class="modal__message">이 FAQ를 삭제하시겠습니까? 삭제된 FAQ는 복구할 수 없습니다.</div>
    <div class="modal__actions">
      <button class="modal__btn modal__btn--cancel" data-modal-close>취소</button>
      <button class="modal__btn modal__btn--delete" id="btnDeleteConfirm">삭제</button>
    </div>
  </div>
</div>

<!-- 공개/비공개 전환 모달 -->
<div class="modal-overlay" id="toggleModal">
  <div class="modal">
    <div class="modal__title" style="color:var(--warning);" id="toggleModalTitle">공개 상태 전환</div>
    <div class="modal__message" id="toggleModalMessage"></div>
    <div class="modal__actions">
      <button class="modal__btn modal__btn--cancel" data-modal-close>취소</button>
      <button class="modal__btn modal__btn--confirm-warning" id="btnToggleConfirm">전환</button>
    </div>
  </div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/common.js"></script>
<script src="js/components.js"></script>
<script src="js/api.js"></script>
<script src="js/contents.js"></script>
</body>
</html>
