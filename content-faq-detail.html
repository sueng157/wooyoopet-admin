<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우유펫 관리자 — FAQ 상세</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/contents.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar__logo-area">
      <img src="assets/images/logo.png" alt="우유펫 로고" class="sidebar__logo-img">
      <div class="sidebar__brand-ko">우유펫</div>
      <div class="sidebar__brand-en">WOOYOOPET</div>
    </div>
    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__menu-item">대시보드</a>
      <a href="members.html" class="sidebar__menu-item">회원관리</a>
      <a href="kindergartens.html" class="sidebar__menu-item">유치원관리</a>
      <a href="pets.html" class="sidebar__menu-item">반려동물관리</a>
      <a href="reservations.html" class="sidebar__menu-item">돌봄예약관리</a>
      <a href="payments.html" class="sidebar__menu-item">결제관리</a>
      <a href="settlements.html" class="sidebar__menu-item">정산관리</a>
      <a href="chats.html" class="sidebar__menu-item">채팅관리</a>
      <a href="reviews.html" class="sidebar__menu-item">후기관리</a>
      <a href="educations.html" class="sidebar__menu-item">교육관리</a>
      <a href="contents.html" class="sidebar__menu-item active">콘텐츠관리</a>
      <a href="settings.html" class="sidebar__menu-item">설정</a>
    </nav>
    <div class="sidebar__profile">
      <div class="sidebar__profile-row">
        <div class="sidebar__avatar"><svg class="sidebar__avatar-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div>
        <div class="sidebar__profile-info"><span class="sidebar__admin-name">홍길동</span><span class="sidebar__admin-role">관리자</span></div>
      </div>
      <div class="sidebar__logout">로그아웃</div>
    </div>
  </aside>

  <div class="main">
    <header class="header"><h1 class="header__title">콘텐츠관리</h1><div class="header__right"><span class="header__admin-name">홍길동 관리자</span><span class="header__logout">로그아웃</span></div></header>

    <div class="content">

      <div class="detail-top">
        <a href="contents.html" class="btn-back">← 목록으로</a>
        <div class="detail-actions">
          <button class="btn-action btn-action--outline-warning" onclick="document.getElementById('privateModal').classList.add('active')">비공개 전환</button>
          <button class="btn-action btn-action--outline-danger" onclick="document.getElementById('deleteModal').classList.add('active')">삭제</button>
        </div>
      </div>

      <div class="detail-card">
        <div class="detail-card__header"><span class="detail-card__title">FAQ 정보</span></div>
        <div class="info-grid">
          <span class="info-grid__label">FAQ 고유번호</span>
          <span class="info-grid__value">FAQ-00000001</span>

          <span class="info-grid__label">카테고리</span>
          <span class="info-grid__value">
            <select class="form-select"><option selected>결제</option><option>돌봄</option><option>환불</option><option>회원</option><option>유치원</option></select>
          </span>

          <span class="info-grid__label">질문</span>
          <span class="info-grid__value"><input type="text" class="form-input" value="결제는 어떻게 하나요?"></span>

          <span class="info-grid__label">답변</span>
          <span class="info-grid__value cnt-full-width">
            <textarea class="form-textarea" rows="10">우유펫에서 돌봄 예약 시 결제는 다음과 같이 진행됩니다.

1. 돌봄 예약 신청 시 결제 수단을 선택합니다.
2. 신용카드, 체크카드, 간편결제(카카오페이, 네이버페이 등)를 지원합니다.
3. 결제가 완료되면 예약이 자동으로 접수됩니다.
4. 유치원이 수락하면 예약이 확정됩니다.

결제 관련 문의사항은 고객센터로 연락해 주세요.</textarea>
          </span>

          <span class="info-grid__label">대상</span>
          <span class="info-grid__value">
            <select class="form-select"><option selected>전체</option><option>보호자</option><option>유치원</option></select>
          </span>

          <span class="info-grid__label">노출 순서</span>
          <span class="info-grid__value"><input type="number" class="form-input form-input--short" value="1"></span>

          <span class="info-grid__label">공개 상태</span>
          <span class="info-grid__value">
            <select class="form-select"><option selected>공개</option><option>비공개</option></select>
          </span>

          <span class="info-grid__label">등록일</span>
          <span class="info-grid__value">2026-03-01</span>

          <span class="info-grid__label">수정일</span>
          <span class="info-grid__value">2026-03-05</span>
        </div>
      </div>

      <div class="detail-bottom-actions">
        <button class="btn-action btn-action--primary">저장</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="privateModal">
  <div class="modal">
    <div class="modal__title">비공개 전환</div>
    <div class="modal__message">이 FAQ를 비공개로 전환하시겠습니까?</div>
    <div class="modal__actions">
      <button class="modal__btn modal__btn--cancel" onclick="document.getElementById('privateModal').classList.remove('active')">취소</button>
      <button class="modal__btn modal__btn--confirm-warning">비공개 전환</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal__title">FAQ 삭제</div>
    <div class="modal__message">이 FAQ를 삭제하시겠습니까? 삭제된 FAQ는 복구할 수 없습니다.</div>
    <div class="modal__actions">
      <button class="modal__btn modal__btn--cancel" onclick="document.getElementById('deleteModal').classList.remove('active')">취소</button>
      <button class="modal__btn modal__btn--delete">삭제</button>
    </div>
  </div>
</div>
</body>
</html>
