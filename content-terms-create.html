<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우유펫 관리자 — 새 약관 등록</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/contents.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar__logo-area">
      <img src="assets/images/logo.png" alt="우유펫 로고" class="sidebar__logo-img">
      <div class="sidebar__brand-ko">우유펫</div>
      <div class="sidebar__brand-en">WOOYOOPET</div>
    </div>
    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__menu-item">대시보드</a>
      <a href="members.html" class="sidebar__menu-item" data-perm="perm_members">회원관리</a>
      <a href="kindergartens.html" class="sidebar__menu-item" data-perm="perm_kindergartens">유치원관리</a>
      <a href="pets.html" class="sidebar__menu-item" data-perm="perm_pets">반려동물관리</a>
      <a href="reservations.html" class="sidebar__menu-item" data-perm="perm_reservations">돌봄예약관리</a>
      <a href="payments.html" class="sidebar__menu-item" data-perm="perm_payments">결제관리</a>
      <a href="settlements.html" class="sidebar__menu-item" data-perm="perm_settlements">정산관리</a>
      <a href="chats.html" class="sidebar__menu-item" data-perm="perm_chats">채팅관리</a>
      <a href="reviews.html" class="sidebar__menu-item" data-perm="perm_reviews">후기관리</a>
      <a href="educations.html" class="sidebar__menu-item" data-perm="perm_educations">교육관리</a>
      <a href="contents.html" class="sidebar__menu-item active" data-perm="perm_contents">콘텐츠관리</a>
      <a href="settings.html" class="sidebar__menu-item" data-perm="perm_settings">설정</a>
    </nav>
    <div class="sidebar__profile">
      <div class="sidebar__profile-row">
        <div class="sidebar__avatar"><svg class="sidebar__avatar-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div>
        <div class="sidebar__profile-info"><span class="sidebar__admin-name">홍길동</span><span class="sidebar__admin-role">관리자</span></div>
      </div>
      <div class="sidebar__logout">로그아웃</div>
    </div>
  </aside>

  <div class="main">
    <header class="header"><h1 class="header__title"><a href="contents.html" style="color:inherit;text-decoration:none;">콘텐츠관리</a> <span style="color:var(--text-weak);font-weight:400;font-size:16px;">› 약관 › 등록</span></h1><div class="header__right"><span class="header__admin-name">홍길동 관리자</span><span class="header__logout">로그아웃</span></div></header>

    <div class="content">

      <div class="detail-top">
        <a href="contents.html" class="btn-back">← 약관 목록으로</a>
        <div class="detail-actions">
          
        </div>
      </div>

      <div class="detail-card">
        <div class="detail-card__header"><span class="detail-card__title">새 약관 등록</span></div>
        <div class="info-grid">
          <span class="info-grid__label">약관 제목</span>
          <span class="info-grid__value"><input type="text" class="form-input" placeholder="약관 제목을 입력하세요"></span>

          <span class="info-grid__label">필수 여부</span>
          <span class="info-grid__value">
            <select class="form-select"><option>필수</option><option>선택</option></select>
          </span>

          <span class="info-grid__label">버전</span>
          <span class="info-grid__value"><input type="text" class="form-input form-input--short" placeholder="v1.0"></span>

          <span class="info-grid__label">시행일</span>
          <span class="info-grid__value"><input type="date" class="form-input form-input--short"></span>

          <span class="info-grid__label">공개 상태</span>
          <span class="info-grid__value">
            <select class="form-select"><option>비공개</option><option>공개</option></select>
          </span>

          <span class="info-grid__label">약관 본문</span>
          <span class="info-grid__value cnt-full-width">
            <textarea class="form-textarea form-textarea--tall" rows="16" placeholder="약관 본문을 입력하세요"></textarea>
          </span>
        </div>
      </div>

      <div class="detail-bottom-actions">
        <button class="btn-action btn-action--primary">등록</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/common.js"></script>
<script src="js/components.js"></script>
<script src="js/api.js"></script>
</body>
</html>
